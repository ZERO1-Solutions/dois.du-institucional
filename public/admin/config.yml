backend:
  name: github
  repo: ZERO1-Solutions/dois.du-institucional
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projetos"
    label: "Projetos"
    folder: "content/projetos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Cliente", name: "cliente", widget: "string" }
      - { label: "Categoria", name: "categoria", widget: "string" }
      - { label: "Ano", name: "ano", widget: "number" }
      - { label: "Imagem de Capa", name: "capa", widget: "image" }
      - { label: "Descrição", name: "descricao", widget: "text" }

  - name: "depoimentos"
    label: "Depoimentos"
    folder: "content/depoimentos"
    create: true
    fields:
      - { label: "Nome", name: "nome", widget: "string" }
      - { label: "Empresa", name: "empresa", widget: "string" }
      - { label: "Depoimento", name: "texto", widget: "text" }
